name: Build LaTeX PDF with Chinese

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.tex'
      - '**.bib'
      - '**.cls'
      - '**.sty'
      - 'fonts/**'
  pull_request:
    branches: [ main, master ]

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest  # 完整 TeX Live 镜像
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SimHei font (if present in repo)
        run: |
          if [ -f fonts/SimHei.ttf ]; then
            mkdir -p /usr/share/fonts/truetype/
            cp fonts/SimHei.ttf /usr/share/fonts/truetype/
            fc-cache -fv
            echo "SimHei font installed from repository."
          else
            echo "Warning: fonts/SimHei.ttf not found, using system fallback."
          fi

      - name: Compile LaTeX with XeLaTeX
        run: |
          latexmk -xelatex \
            -file-line-error \
            -interaction=nonstopmode \
            -synctex=1 \
            main.tex     # 👈 改成你的主文件名

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: main.pdf  # 👈 改成输出的 PDF 文件名

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest           # 固定标签
          name: Latest Build         # 显示名称
          body: 自动构建的最新 PDF，点击下方下载。
          files: main.pdf
          prerelease: true           # 标记为预发布，不会作为正式版推送通知
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}